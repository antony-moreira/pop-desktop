---
- name: Preparing Modern Workstation (Pop!_OS 22.04)
  hosts: localhost
  connection: local
  vars:
    real_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"
    user_home: "/home/{{ real_user }}"
    zsh_custom: "{{ user_home }}/.oh-my-zsh/custom"

  tasks:
    - name: Installing Essential and Modern Apps (Apt)
      become: true
      apt:
        name: 
          - vim
          - curl
          - wget
          - git
          - zsh
          - neovim
          - bat
          - eza
          - zoxide
          - unzip
          - fontconfig
          - python3-pip
          - software-properties-common
        state: present
        update_cache: yes

    # --- FONTES (Hack Nerd Font) ---
    - name: Creating Fonts Directory
      file:
        path: "{{ user_home }}/.local/share/fonts"
        state: directory
        mode: '0755'

    - name: Installing Hack Nerd Font
      unarchive:
        src: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/Hack.zip
        dest: "{{ user_home }}/.local/share/fonts"
        remote_src: yes
        creates: "{{ user_home }}/.local/share/fonts/HackNerdFont-Regular.ttf"

    - name: Updating Font Cache
      command: fc-cache -fv
      changed_when: false

    # --- TERMINAL TOOLS (FZF, Starship) ---
    - name: Installing FZF
      git:
        repo: 'https://github.com/junegunn/fzf.git'
        dest: "{{ user_home }}/.fzf"
        depth: 1
      register: fzf_git

    - name: Running FZF Install Script
      shell: "{{ user_home }}/.fzf/install --all"
      when: fzf_git.changed

    - name: Installing Starship
      become: true
      shell: "curl -sS https://starship.rs/install.sh | sh -s -- -y"
      args:
        creates: /usr/local/bin/starship

    # --- OH-MY-ZSH E PLUGINS ---
    - name: Check if Oh-My-zsh exists
      stat:
        path: "{{ user_home }}/.oh-my-zsh"
      register: ohmyzsh

    - name: Installing Oh-My-zsh
      shell: 'curl -fsL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh | sh'
      args:
        creates: "{{ user_home }}/.oh-my-zsh"
      when: not ohmyzsh.stat.exists

    - name: Installing ZSH Plugins and Themes
      git:
        repo: "{{ item.repo }}"
        dest: "{{ item.dest }}"
        depth: 1
      loop:
        - { repo: 'https://github.com/zsh-users/zsh-autosuggestions', dest: '{{ zsh_custom }}/plugins/zsh-autosuggestions' }
        - { repo: 'https://github.com/zsh-users/zsh-syntax-highlighting.git', dest: '{{ zsh_custom }}/plugins/zsh-syntax-highlighting' }
        - { repo: 'https://github.com/romkatv/powerlevel10k.git', dest: '{{ zsh_custom }}/themes/powerlevel10k' }

    - name: Configuring .zshrc (Plugins and Theme)
      lineinfile:
        path: "{{ user_home }}/.zshrc"
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^ZSH_THEME=', line: 'ZSH_THEME="powerlevel10k/powerlevel10k"' }
        - { regexp: '^plugins=', line: 'plugins=(git docker docker-compose kubectl zsh-autosuggestions zsh-syntax-highlighting zoxide)' }

    - name: Adding Aliases and Tools to .zshrc
      blockinfile:
        path: "{{ user_home }}/.zshrc"
        block: |
          # Modern CLI Tools Aliases
          alias ls='eza --icons'
          alias cat='batcat'
          eval "$(zoxide init zsh)"
          # Se preferir usar o Starship em vez do P10k, descomente a linha abaixo:
          # eval "$(starship init zsh)"

    # --- DOCKER, CHROME, VSCODE (Mantidos do passo anterior) ---
    - name: Installing Docker Plugin
      become: true
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]